name: life_line_ngo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: ^6.1.0
  firebase_core: ^4.2.1
  flutter_riverpod: ^3.3.1
  flutter:
    sdk: flutter
  flutter_dropzone: ^4.2.1


dev_dependencies: 
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Logos/
    - assets/images/
  
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: OpenSansItalic
      fonts:
        - asset: assets/fonts/OpenSans-Italic-VariableFont_wdth,wght.ttf
    - family: OpenSansVariable
      fonts:
        - asset: assets/fonts/OpenSans-VariableFont_wdth,wght.ttf
